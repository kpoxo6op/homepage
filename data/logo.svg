<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.0//EN"
 "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<svg width="200px" height="200px" version="1.0" xmlns="http://www.w3.org/2000/svg">
  <!-- Head shape -->
  <circle cx="100" cy="100" r="80" stroke="black" fill="#FFD19A" stroke-width="2"/>
  
  <!-- Eyes -->
  <circle cx="70" cy="80" r="10" fill="white"/>
  <circle cx="70" cy="80" r="5" fill="black"/>
  <circle cx="130" cy="80" r="10" fill="white"/>
  <circle cx="130" cy="80" r="5" fill="black"/>

  <!-- Nose -->
  <path d="M100,90 Q105,100 100,110" stroke="black" fill="transparent" stroke-width="2"/>

  <!-- Mouth -->
  <path d="M70,130 Q100,150 130,130" stroke="black" fill="transparent" stroke-width="2" stroke-linecap="round"/>
</svg>
